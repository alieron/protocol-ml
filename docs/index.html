<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>protocol-ml - Interactive Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: #252526;
            padding: 1rem 2rem;
            border-bottom: 1px solid #3e3e42;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
        }

        .subtitle {
            font-size: 0.875rem;
            color: #858585;
            margin-top: 0.25rem;
        }

        main {
            display: flex;
            height: calc(100vh - 80px);
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #3e3e42;
        }

        .panel:last-child {
            border-right: none;
        }

        .panel-header {
            background: #2d2d2d;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-title {
            font-size: 0.875rem;
            font-weight: 500;
            color: #cccccc;
        }

        .copy-btn {
            background: #0e639c;
            color: white;
            border: none;
            padding: 0.4rem 0.75rem;
            border-radius: 3px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: #1177bb;
        }

        .copy-btn:active {
            background: #0d5a8f;
        }

        .copy-btn.copied {
            background: #16825d;
        }

        .panel-content {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        #editor {
            width: 100%;
            height: 100%;
            background: #1e1e1e;
            color: #d4d4d4;
            border: none;
            padding: 1rem;
            font-family: 'JetBrains Mono', 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        #preview {
            padding: 2rem;
            background: #2d2d2d;
            min-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error {
            color: #f48771;
            padding: 1rem;
            font-family: monospace;
            font-size: 0.875rem;
            white-space: pre-wrap;
        }

        .protocol-ml-wrapper {
            display: inline-block;
        }

        svg {
            max-width: 100%;
            height: auto;
        }

        @media (max-width: 768px) {
            main {
                flex-direction: column;
            }

            .panel {
                border-right: none;
                border-bottom: 1px solid #3e3e42;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>protocol-ml</h1>
        <p class="subtitle">Interactive Protocol Diagram Editor</p>
    </header>

    <main>
        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">Code Editor</span>
                <button class="copy-btn" id="copyCode">Copy Code</button>
            </div>
            <div class="panel-content">
                <textarea id="editor" spellcheck="false">
def messageSpacing 20px
def participantSpacing 160px

participant Alice a
participant Bob b

a -> b : "normal"
b -> a : "normal reply"

a ~> b : "corrupted"
b ~> a : "corrupted reply"

a -x b : "dropped"
b -x a : "dropped reply"

a => b : "thick"
b => a : "thick reply"

a @2 < "left label @2"
b @5 > "right label @5"'
</textarea>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">SVG Preview</span>
                <div>
                    <button class="copy-btn" id="copyPNG">Copy PNG</button>
                    <button class="copy-btn" id="copySVG" style="margin-left: 0.5rem;">Copy SVG</button>
                </div>
            </div>
            <div class="panel-content">
                <div id="preview"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { parse } from '../src/parser.ts';
        import { renderSVG } from '../src/renderer.ts';

        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const copyCodeBtn = document.getElementById('copyCode');
        const copyPNGBtn = document.getElementById('copyPNG');
        const copySVGBtn = document.getElementById('copySVG');

        let currentSVG = '';

        function render() {
            const code = editor.value;
            try {
                const diagram = parse(code);
                currentSVG = renderSVG(diagram);
                preview.innerHTML = `<div class="protocol-ml-wrapper">${currentSVG}</div>`;
            } catch (err) {
                preview.innerHTML = `<div class="error">Error: ${err.message}</div>`;
                currentSVG = '';
            }
        }

        // Debounce rendering for performance
        let renderTimeout;
        editor.addEventListener('input', () => {
            clearTimeout(renderTimeout);
            renderTimeout = setTimeout(render, 300);
        });

        copyCodeBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(editor.value);
                copyCodeBtn.textContent = 'Copied!';
                copyCodeBtn.classList.add('copied');
                setTimeout(() => {
                    copyCodeBtn.textContent = 'Copy Code';
                    copyCodeBtn.classList.remove('copied');
                }, 2000);
            } catch (err) {
                console.error('Failed to copy:', err);
            }
        });

        copyPNGBtn.addEventListener('click', async () => {
            if (!currentSVG) return;
            try {
                const svgElement = preview.querySelector('svg');
                if (!svgElement) return;

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const svgData = new XMLSerializer().serializeToString(svgElement);

                canvas.width = svgElement.width.baseVal.value;
                canvas.height = svgElement.height.baseVal.value;

                const img = new Image();
                const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
                const url = URL.createObjectURL(svgBlob);

                img.onload = async () => {
                    ctx.drawImage(img, 0, 0);
                    URL.revokeObjectURL(url);

                    canvas.toBlob(async (blob) => {
                        try {
                            await navigator.clipboard.write([
                                new ClipboardItem({ 'image/png': blob })
                            ]);
                            copyPNGBtn.textContent = 'Copied!';
                            copyPNGBtn.classList.add('copied');
                            setTimeout(() => {
                                copyPNGBtn.textContent = 'Copy PNG';
                                copyPNGBtn.classList.remove('copied');
                            }, 2000);
                        } catch (err) {
                            console.error('Failed to copy PNG:', err);
                            copyPNGBtn.textContent = 'Failed';
                            setTimeout(() => {
                                copyPNGBtn.textContent = 'Copy PNG';
                            }, 2000);
                        }
                    }, 'image/png');
                };

                img.onerror = () => {
                    console.error('Failed to load SVG');
                    URL.revokeObjectURL(url);
                };

                img.src = url;
            } catch (err) {
                console.error('Failed to copy PNG:', err);
            }
        });

        copySVGBtn.addEventListener('click', async () => {
            if (!currentSVG) return;
            try {
                await navigator.clipboard.writeText(currentSVG);
                copySVGBtn.textContent = 'Copied!';
                copySVGBtn.classList.add('copied');
                setTimeout(() => {
                    copySVGBtn.textContent = 'Copy SVG';
                    copySVGBtn.classList.remove('copied');
                }, 2000);
            } catch (err) {
                console.error('Failed to copy:', err);
            }
        });

        // Initial render
        render();
    </script>
</body>

</html>
